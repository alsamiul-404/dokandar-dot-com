<h2 class="sr-only">
  দোকানদার.app এর database schema — ৬টি table এবং তাদের মধ্যে সম্পর্ক।
</h2>
<div id="erd" style="padding: 0.5rem 0"></div>
<script type="module">
  import mermaid from "https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs";
  const dark = matchMedia("(prefers-color-scheme: dark)").matches;
  await document.fonts.ready;
  mermaid.initialize({
    startOnLoad: false,
    theme: "base",
    fontFamily: '"Anthropic Sans", sans-serif',
    themeVariables: {
      darkMode: dark,
      fontSize: "13px",
      fontFamily: '"Anthropic Sans", sans-serif',
      lineColor: dark ? "#9c9a92" : "#73726c",
      textColor: dark ? "#c2c0b6" : "#3d3d3a",
      primaryColor: dark ? "#2a2928" : "#f5f4f0",
      primaryBorderColor: dark ? "#4a4845" : "#c8c6be",
    },
  });
  const diagram = `erDiagram
  shops {
    uuid id PK
    string name
    string phone
    string owner_name
    string plan
    timestamp created_at
  }
  customers {
    uuid id PK
    uuid shop_id FK
    string name
    string phone
    int total_due
    timestamp created_at
  }
  credit_entries {
    uuid id PK
    uuid customer_id FK
    uuid shop_id FK
    int amount
    string note
    string type
    timestamp entry_date
  }
  products {
    uuid id PK
    uuid shop_id FK
    string name
    string category
    int quantity
    int buy_price
    int sell_price
    int low_stock_alert
  }
  stock_logs {
    uuid id PK
    uuid product_id FK
    int change_qty
    string reason
    timestamp logged_at
  }
  sales {
    uuid id PK
    uuid shop_id FK
    uuid customer_id FK
    int total_amount
    int cash_paid
    int credit_amount
    timestamp sale_date
  }

  shops ||--o{ customers : "দোকানে customer"
  shops ||--o{ products : "দোকানে পণ্য"
  shops ||--o{ sales : "দোকানে বিক্রি"
  customers ||--o{ credit_entries : "customer-এর বাকি"
  customers ||--o{ sales : "customer-এর কেনা"
  products ||--o{ stock_logs : "পণ্যের stock history"
`;
  const { svg } = await mermaid.render("erd-svg", diagram);
  document.getElementById("erd").innerHTML = svg;

  document.querySelectorAll("#erd svg .node").forEach((node) => {
    const firstPath = node.querySelector("path[d]");
    if (!firstPath) return;
    const d = firstPath.getAttribute("d");
    const nums = d.match(/-?[\d.]+/g)?.map(Number);
    if (!nums || nums.length < 8) return;
    const xs = [nums[0], nums[2], nums[4], nums[6]];
    const ys = [nums[1], nums[3], nums[5], nums[7]];
    const x = Math.min(...xs),
      y = Math.min(...ys);
    const w = Math.max(...xs) - x,
      h = Math.max(...ys) - y;
    const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    rect.setAttribute("x", x);
    rect.setAttribute("y", y);
    rect.setAttribute("width", w);
    rect.setAttribute("height", h);
    rect.setAttribute("rx", "8");
    for (const a of ["fill", "stroke", "stroke-width", "class", "style"]) {
      if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
    }
    firstPath.replaceWith(rect);
  });
  document
    .querySelectorAll("#erd svg .row-rect-odd path, #erd svg .row-rect-even path")
    .forEach((p) => {
      p.setAttribute("stroke", "none");
    });
</script>
